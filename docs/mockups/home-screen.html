<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Screen — Personal Listening OS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; }

  .phone-shell {
    width: 390px;
    background: #24143d;
    border-radius: 44px;
    padding: 12px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
    position: relative;
  }

  .screen {
    background: #0f0a1e;
    border-radius: 36px;
    overflow: hidden;
    min-height: 780px;
    position: relative;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 28px 0;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
  }
  .status-bar .time { font-size: 16px; font-weight: 700; }
  .status-icons { display: flex; gap: 6px; align-items: center; font-size: 13px; }

  /* Dynamic island */
  .dynamic-island {
    width: 120px;
    height: 34px;
    background: #000;
    border-radius: 20px;
    margin: 8px auto 0;
  }

  /* Hero album art */
  .hero {
    position: relative;
    margin: 20px 24px 0;
  }

  .album-art {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 16px;
    background: linear-gradient(135deg, #843dff 0%, #6b04fd 40%, #24143d 100%);
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(132, 61, 255, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .album-art::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='100' cy='100' r='80' fill='none' stroke='rgba(255,255,255,0.05)' stroke-width='1'/%3E%3Ccircle cx='100' cy='100' r='50' fill='none' stroke='rgba(255,255,255,0.05)' stroke-width='1'/%3E%3Ccircle cx='100' cy='100' r='10' fill='rgba(255,255,255,0.1)'/%3E%3C/svg%3E") center/50% no-repeat;
  }

  .album-art-label {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    text-align: center;
    z-index: 1;
    position: relative;
  }

  /* Playing indicator */
  .now-playing-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 4px 10px;
    display: flex;
    align-items: center;
    gap: 5px;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
  }

  .playing-dot {
    width: 6px; height: 6px;
    background: #78a63c;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Album info */
  .album-info {
    padding: 20px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .album-text h2 {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.3px;
  }

  .album-text p {
    color: #aeacb0;
    font-size: 16px;
    margin-top: 4px;
    font-weight: 500;
  }

  .playlist-tag {
    background: rgba(132, 61, 255, 0.15);
    border: 1px solid rgba(132, 61, 255, 0.3);
    border-radius: 20px;
    padding: 4px 10px;
    color: #bea6ff;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    margin-top: 4px;
  }

  /* Progress section */
  .progress-section {
    padding: 20px 24px 0;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .progress-label {
    color: #aeacb0;
    font-size: 13px;
    font-weight: 500;
  }

  .progress-value {
    color: #bea6ff;
    font-size: 13px;
    font-weight: 600;
  }

  .progress-bar-bg {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    width: 58%;
    background: linear-gradient(90deg, #843dff, #bea6ff);
    border-radius: 2px;
  }

  .track-info {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }

  .current-track {
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    opacity: 0.8;
  }

  /* Actions */
  .actions {
    padding: 24px 24px 0;
    display: flex;
    gap: 12px;
  }

  .btn-primary {
    flex: 1;
    background: #843dff;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-secondary {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    border-radius: 14px;
    padding: 16px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .star-btn {
    width: 54px;
    height: 54px;
    background: rgba(222, 124, 56, 0.15);
    border: 1px solid rgba(222, 124, 56, 0.3);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* This week section */
  .section-header {
    padding: 28px 24px 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .section-title {
    color: #fff;
    font-size: 18px;
    font-weight: 700;
  }

  .section-link {
    color: #843dff;
    font-size: 14px;
    font-weight: 600;
  }

  .album-row {
    padding: 0 24px;
    display: flex;
    gap: 12px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }

  .album-card {
    flex-shrink: 0;
    width: 100px;
  }

  .album-card-art {
    width: 100px;
    height: 100px;
    border-radius: 10px;
    margin-bottom: 6px;
    position: relative;
    overflow: hidden;
  }

  .album-card-art.a1 { background: linear-gradient(135deg, #843dff, #24143d); }
  .album-card-art.a2 { background: linear-gradient(135deg, #78a63c, #24143d); }
  .album-card-art.a3 { background: linear-gradient(135deg, #de7c38, #24143d); }
  .album-card-art.a4 { background: linear-gradient(135deg, #3d84ff, #24143d); }

  .album-card-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: rgba(255,255,255,0.15);
  }

  .album-card-progress-fill {
    height: 100%;
    background: #78a63c;
  }

  .album-card-name {
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.3;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .album-card-artist {
    color: #aeacb0;
    font-size: 11px;
    margin-top: 2px;
  }

  /* Tab bar */
  .tab-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(15, 10, 30, 0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 10px 0 28px;
    display: flex;
    justify-content: space-around;
  }

  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: #aeacb0;
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
  }

  .tab-item.active { color: #843dff; }

  .tab-icon {
    font-size: 22px;
    line-height: 1;
  }

  .sync-indicator {
    padding: 12px 24px 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sync-dot { width: 5px; height: 5px; background: #78a63c; border-radius: 50%; }
  .sync-text { color: #aeacb0; font-size: 11px; }
</style>
</head>
<body>
<div class="phone-shell">
  <div class="screen">
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="dynamic-island"></div>
      <div class="status-icons">
        <span>●●●</span>
        <span>WiFi</span>
        <span>🔋</span>
      </div>
    </div>

    <div class="hero">
      <div class="album-art">
        <div class="album-art-label">Album Art</div>
        <div class="now-playing-badge">
          <div class="playing-dot"></div>
          Now Playing
        </div>
      </div>
    </div>

    <div class="album-info">
      <div class="album-text">
        <h2>Romance</h2>
        <p>Fontaines D.C.</p>
        <div class="playlist-tag">New Albums 04/04/26</div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-label">Track 7 of 12</span>
        <span class="progress-value">58%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill"></div>
      </div>
      <div class="track-info">
        <span class="current-track">Favourite</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary">▶ Open in Spotify</button>
      <button class="btn-secondary">⋯ View Album</button>
      <div class="star-btn">☆</div>
    </div>

    <div class="sync-indicator">
      <div class="sync-dot"></div>
      <span class="sync-text">Synced 3 min ago</span>
    </div>

    <div class="section-header">
      <span class="section-title">This Week</span>
      <span class="section-link">See all</span>
    </div>

    <div class="album-row">
      <div class="album-card">
        <div class="album-card-art a1">
          <div class="album-card-progress"><div class="album-card-progress-fill" style="width:58%"></div></div>
        </div>
        <div class="album-card-name">Romance</div>
        <div class="album-card-artist">Fontaines D.C.</div>
      </div>
      <div class="album-card">
        <div class="album-card-art a2">
          <div class="album-card-progress"><div class="album-card-progress-fill" style="width:100%"></div></div>
        </div>
        <div class="album-card-name">Manning Fireworks</div>
        <div class="album-card-artist">MJ Lenderman</div>
      </div>
      <div class="album-card">
        <div class="album-card-art a3">
          <div class="album-card-progress"><div class="album-card-progress-fill" style="width:15%"></div></div>
        </div>
        <div class="album-card-name">Bright Future</div>
        <div class="album-card-artist">Adrianne Lenker</div>
      </div>
      <div class="album-card">
        <div class="album-card-art a4">
          <div class="album-card-progress"><div class="album-card-progress-fill" style="width:0%"></div></div>
        </div>
        <div class="album-card-name">Imaginal Disk</div>
        <div class="album-card-artist">Magdalena Bay</div>
      </div>
    </div>

    <div style="height: 120px"></div>

    <div class="tab-bar">
      <div class="tab-item active">
        <div class="tab-icon">⊙</div>
        <span>Now</span>
      </div>
      <div class="tab-item">
        <div class="tab-icon">♫</div>
        <span>Albums</span>
      </div>
      <div class="tab-item">
        <div class="tab-icon">★</div>
        <span>Ratings</span>
      </div>
      <div class="tab-item">
        <div class="tab-icon">⊕</div>
        <span>Discover</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
